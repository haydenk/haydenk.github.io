name: Deploy Hugo site to Pages

on:
  push:
    branches: ["master"]
    paths-ignore:
      - "README.md"
      - ".github/dependabot.yml"
      - ".github/FUNDING.yml"
      - ".github/SECURITY.md"
      - ".github/lockdown.yml"
      - ".github/settings.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup dependencies
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_BASEURL: "${{ steps.pages.outputs.base_url }}/"
        run: mise build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  notify-profile:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: Dispatch to profile repo
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: haydenk/haydenk
          event-type: blog-updated

  release:
    if: github.event_name == 'push'
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Compute tag
        id: tag
        run: |
          tag="$(date -u +%Y-%m-%d)-$(git rev-parse --short HEAD)"
          if [ "${GITHUB_RUN_ATTEMPT}" != "1" ]; then
            tag="${tag}-r${GITHUB_RUN_ATTEMPT}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Download Pages artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages

      - name: Repackage tarball
        run: |
          mkdir site
          tar -xf artifact.tar -C site
          tar -czf "haydenk-blog-${{ steps.tag.outputs.tag }}.tar.gz" -C site .

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: haydenk-blog-${{ steps.tag.outputs.tag }}.tar.gz
