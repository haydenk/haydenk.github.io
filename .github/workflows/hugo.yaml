name: Deploy Hugo site to Pages

on:
  push:
    branches: ["master"]
    paths-ignore:
      - "README.md"
      - ".github/dependabot.yml"
      - ".github/FUNDING.yml"
      - ".github/SECURITY.md"
      - ".github/lockdown.yml"
      - ".github/settings.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  DAGGER_VERSION: "0.21.4"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Install Dagger
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
        with:
          version: ${{ env.DAGGER_VERSION }}

      - name: Test (lint + htmltest + linkcheck)
        run: dagger call test

      - name: Build site
        env:
          BASE_URL: "${{ steps.pages.outputs.base_url }}/"
        run: dagger call build --base-url="$BASE_URL" export --path=./dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  notify-profile:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Dagger
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
        with:
          version: ${{ env.DAGGER_VERSION }}

      - name: Dispatch blog-updated to profile repo
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: dagger call notify-profile --token=env:PAT_TOKEN

  release:
    if: github.event_name == 'push'
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download Pages artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages

      - name: Compute tag
        id: tag
        run: |
          tag="$(date -u +%Y-%m-%d)-$(git rev-parse --short HEAD)"
          if [ "${GITHUB_RUN_ATTEMPT}" != "1" ]; then
            tag="${tag}-r${GITHUB_RUN_ATTEMPT}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Install Dagger
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
        with:
          version: ${{ env.DAGGER_VERSION }}

      - name: Package and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dagger call release \
            --pages-artifact=./artifact.tar \
            --tag="${{ steps.tag.outputs.tag }}" \
            --token=env:GH_TOKEN
