baseURL = 'https://haydenk.github.io/'
languageCode = 'en-us'
title = 'Hayden King'
theme = 'github.com/adityatelange/hugo-PaperMod'
disableHugoGeneratorInject = true
ignoreErrors = [ "error-disable-taxonomy" ]
enableEmoji = true
enableRobotsTXT = true
mainSections = ['posts', 'bible-notes']

[module]
  [[module.imports]]
    path = "github.com/adityatelange/hugo-PaperMod"
  [[module.imports]]
    path = "github.com/haydenk/lynko"

[params]
  goatcounterHost = 'haydenk.goatcounter.com'
  resumeURL = 'https://github.com/haydenk/vitae/releases/latest/download/hayden_king.pdf'
  images = ['/images/og-default.png']
  keywords = ['software development', 'aws', 'devops', 'homelab', 'proxmox', 'bible study', 'sermon notes', 'faith', 'Christian', 'discipleship', 'lakepointe church', 'texas']
  description = "Texas software developer writing about AWS, DevOps, and homelab projects -- plus Bible notes and faith reflections from Lakepointe Church."
  defaultTheme = "auto"
  disableThemeToggle = true
  ShowPostNavLinks = true
  ShowReadingTime = true
  ShowShareButtons = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  [[params.plugins.css]]
    link = "plugins/themify-icons/icons.css"
  [params.homeInfoParams]
    enabled = true
    title = "Hey, I'm Hayden"
    content = "I build things on the web by day and take notes in church on Sunday. Here you'll find posts on AWS, DevOps, and homelab tinkering alongside Bible notes from Lakepointe Church. Pull up a chair."
  [[params.socialIcons]]
    name = "Github"
    url = "https://github.com/haydenk"
  [[params.socialIcons]]
    name = "LinkedIn"
    url = "https://www.linkedin.com/in/imhaydenk/"
  [[params.socialIcons]]
    name = "StackOverflow"
    url = "https://stackoverflow.com/users/464467/hayden"

# ── Lynko Configuration ───────────────────────────────────────────────────────
[params.lynko]
  # Display name shown on the page
  title = "Hayden King"

  # Subtitle / handle shown below the name
  handle = "@haydenk"

  # Short bio displayed under the handle
  bio = "Builder of things on the web."

  # Profile picture (relative to static/ or an absolute URL)
  avatar = "https://avatars.githubusercontent.com/u/81236?v=4"

  # Override the site's primary accent colour (any valid CSS colour).
  # When omitted, the module default (sky blue) is used.
  # primaryColor = "#f97316"

  # Set to false to hide the "Powered by Lynko" footer line
  showPoweredBy = true

  # ── Main link buttons ────────────────────────────────────────────────────────
  # Each entry becomes a large tappable button.
  # icon is required; omitting it falls back to the generic "link" icon.
  # Supported icons: github · twitter · linkedin · instagram · youtube · tiktok
  #   facebook · discord · twitch · mastodon · bluesky · reddit · medium ·
  #   substack · patreon · spotify · soundcloud · pinterest · email · rss ·
  #   globe · link

  [[params.lynko.links]]
    title  = "GitHub"
    url    = "https://github.com/haydenk"
    icon   = "github"

  [[params.lynko.links]]
    title  = "LinkedIn"
    url    = "https://linkedin.com/in/haydenk"
    icon   = "linkedin"

  [[params.lynko.links]]
    title  = "Contact"
    url    = "https://haydenk.github.io/contact/"
    icon   = "email"

  # ── Social icon row ───────────────────────────────────────────────────────────
  # Small platform icons shown at the bottom of the page.
  # 'name' must match one of the supported icon names above.

  [[params.lynko.social]]
    name = "github"
    url  = "https://github.com/haydenk"

  [[params.lynko.social]]
    name = "linkedin"
    url  = "https://linkedin.com/in/haydenk"

  [[params.lynko.social]]
    name = "rss"
    url  = "/feed.xml"

[menus]
  [[menus.main]]
    name = 'Home'
    pageRef = '/'
    weight = 10

  [[menus.main]]
    name = "Posts"
    pageRef = "/posts"
    weight = 11

  [[menus.main]]
    name = "Tags"
    pageRef = "/tags"
    weight = 15

  [[menus.main]]
    name = "Snippets"
    pageRef = "/snippets"
    weight = 12

  [[menus.main]]
    name = "Bible Notes"
    pageRef = "/bible-notes"
    weight = 13

  [[menus.main]]
    name = "Archive"
    pageRef = "/archives"
    weight = 99

  [[menus.footer]]
    name = 'Github'
    url = 'https://github.com/haydenk/'
    weight = 1
    [menus.footer.params]
      icon = 'fa-brands fa-github'

  [[menus.footer]]
    name = 'LinkedIn'
    url = 'http://linkedin.com/in/haydenking'
    weight = 2
    [menus.footer.params]
      icon = 'fa-brands fa-square-linkedin'

  [[menus.footer]]
    name = 'X'
    url = 'http://x.com/__haydenk'
    weight = 3
    [menus.footer.params]
      icon = 'fa-brands fa-square-x-twitter'

  [[menus.footer]]
    name = 'Instagram'
    url = 'http://instagram.com/mr.haydenk'
    weight = 4
    [menus.footer.params]
      icon = 'fa-brands fa-instagram'

  [[menus.footer]]
    name = 'RSS Feed'
    url = '/feed.xml'
    weight = 5
    [menus.footer.params]
      icon = 'fa-solid fa-rss'

[permalinks]
  [permalinks.page]
    posts = '/posts/:year/:month/:day/:slug/'
    bible-notes = '/bible-notes/:year/:month/:day/:slug/'
    snippets = '/snippets/:year/:month/:day/:slug/'
  [permalinks.section]
    posts = '/posts/'
    bible-notes = '/bible-notes/'
    snippets = '/snippets/'

[taxonomies]
    tag = "tags"
    category = "archive"

[outputFormats]
  [outputFormats.rss]
    mediaType = "application/rss+xml"
    baseName = "feed"
  [outputFormats.json]
    mediaType = "application/json"
    baseName = "feed"
    isPlainText = true

[outputs]
  home = ['html','json','rss']
  page = ['html']
  section = ['html']
  taxonomy = ['html']
  term = ['html']

[pagination]
  pagerSize = 10

ignoreLogs = ['warning-goldmark-raw-html']

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      wrapStandAloneImageWithinParagraph = false
      [markup.goldmark.parser.attribute]
        block = true
        title = true
        anchor = true
      [markup.goldmark.renderHooks.image]
        useEmbedded = 'auto'

[privacy]
  [privacy.youTube]
    disable = false
    privacyEnhanced = false
