baseURL = 'https://haydenk.github.io/'
languageCode = 'en-us'
defaultContentLanguage = 'en'
title = 'Hayden King'
disableHugoGeneratorInject = true
enableEmoji = true
enableRobotsTXT = true

[module]
  [[module.imports]]
    path = "github.com/Lednerb/bilberry-hugo-theme/v4"
  [[module.imports]]
    path = "github.com/haydenk/lynko"

[params]
  goatcounterHost = 'haydenk.goatcounter.com'
  resumeURL = 'https://github.com/haydenk/vitae/releases/latest/download/hayden_king.pdf'
  images = ['/images/og-default.png']

  # Custom CSS/JS modules loaded after theme.css / theme.js
  css_modules = []
  js_modules = []

  # SEO / metadata
  authorName = 'Hayden King'
  authorEmail = ''
  description = "Texas software developer writing about AWS, DevOps, and homelab projects -- plus Bible notes and faith reflections from Lakepointe Church."
  keywords = 'software development,aws,devops,homelab,proxmox,bible study,sermon notes,faith,Christian,discipleship,lakepointe church,texas'

  paginate = 10

  enable_mathjax = false
  algolia_search = false

  # Media configuration
  resizeImages = false

  # Header configuration
  subtitle = "I build things on the web by day and take notes in church on Sunday."
  customImage = 'https://avatars.githubusercontent.com/u/81236?v=4'
  overlayIcon = 'fa-home'
  permanentTopNav = true
  stickyNav = false
  enableLightDarkTheme = true

  # Content configuration
  enableMomentJs = false
  dateFormat = '2006-01-02'
  showReadingTime = true
  tocMinWordCount = 400

  # Footer configuration
  showFooter = true
  amountLatestPostsInFooter = 7
  amountCategoriesInFooter = -1
  showSocialMedia = true
  socialMediaLinks = [
    { link = 'https://github.com/haydenk/', icon = 'fab fa-github', rel = 'me' },
    { link = 'http://linkedin.com/in/imhaydenk', icon = 'fab fa-linkedin' },
    { link = 'https://stackoverflow.com/users/464467/hayden', icon = 'fab fa-stack-overflow' },
    { link = '/feed.xml', icon = 'fas fa-rss' },
  ]
  showArchive = true
  archiveDateGrouping = '2006-01'
  copyrightBy = 'by Hayden King'
  copyrightUseCurrentYear = true
  copyrightUrl = 'https://github.com/haydenk'
  creditsText = 'Bilberry Hugo Theme'
  creditsUrl = 'https://github.com/Lednerb/bilberry-hugo-theme'

# ── Lynko Configuration ───────────────────────────────────────────────────────
[params.lynko]
  # Display name shown on the page
  title = "Hayden King"

  # Subtitle / handle shown below the name
  handle = "@haydenk"

  # Short bio displayed under the handle
  bio = "Builder of things on the web."

  # Profile picture (relative to static/ or an absolute URL)
  avatar = "https://avatars.githubusercontent.com/u/81236?v=4"

  # Override the site's primary accent colour (any valid CSS colour).
  # When omitted, the module default (sky blue) is used.
  # primaryColor = "#f97316"

  # Set to false to hide the "Powered by Lynko" footer line
  showPoweredBy = true

  # ── Main link buttons ────────────────────────────────────────────────────────
  # Each entry becomes a large tappable button.
  # icon is required; omitting it falls back to the generic "link" icon.
  # Supported icons: github · twitter · linkedin · instagram · youtube · tiktok
  #   facebook · discord · twitch · mastodon · bluesky · reddit · medium ·
  #   substack · patreon · spotify · soundcloud · pinterest · email · rss ·
  #   globe · link

  [[params.lynko.links]]
    title  = "GitHub"
    url    = "https://github.com/haydenk"
    icon   = "github"

  [[params.lynko.links]]
    title  = "LinkedIn"
    url    = "https://linkedin.com/in/imhaydenk"
    icon   = "linkedin"

  [[params.lynko.links]]
    title  = "StackOverflow"
    url    = "https://stackoverflow.com/users/464467/hayden"
    icon   = "stackoverflow"

  [[params.lynko.links]]
    title  = "Contact"
    url    = "https://haydenk.github.io/contact/"
    icon   = "email"

  # ── Social icon row ───────────────────────────────────────────────────────────
  # Small platform icons shown at the bottom of the page.
  # 'name' must match one of the supported icon names above.

  [[params.lynko.social]]
    name = "github"
    url  = "https://github.com/haydenk"

  [[params.lynko.social]]
    name = "linkedin"
    url  = "https://linkedin.com/in/imhaydenk"

  [[params.lynko.social]]
    name  = "StackOverflow"
    url    = "https://stackoverflow.com/users/464467/hayden"

  [[params.lynko.social]]
    name = "rss"
    url  = "/feed.xml"

[menus]
  [[menus.topnav]]
    name = 'Posts'
    pageRef = '/posts'
    weight = 10

  [[menus.topnav]]
    name = 'Bible Notes'
    pageRef = '/bible-notes'
    weight = 11

  [[menus.topnav]]
    name = 'Notes'
    pageRef = '/notes'
    weight = 12

  [[menus.topnav]]
    name = 'Tags'
    pageRef = '/tags'
    weight = 13

  [[menus.topnav]]
    name = 'Gists'
    url = 'https://gist.github.com/haydenk'
    weight = 14

  [[menus.topnav]]
    name = 'Resume'
    url = 'https://github.com/haydenk/vitae/releases/latest/download/hayden_king.pdf'
    weight = 15

  [[menus.topnav]]
    name = 'Archive'
    pageRef = '/archive'
    weight = 99

[permalinks]
  [permalinks.page]
    posts = '/posts/:year/:month/:day/:slug/'
    bible-notes = '/bible-notes/:year/:month/:day/:slug/'
    notes = '/notes/:slug/'
  [permalinks.section]
    posts = '/posts/'
    bible-notes = '/bible-notes/'
    notes = '/notes/'

[taxonomies]
  author = 'author'
  tag = 'tags'
  category = 'categories'
  series = 'series'

[outputFormats]
  [outputFormats.rss]
    mediaType = "application/rss+xml"
    baseName = "feed"

[outputs]
  home = ['html', 'rss']
  page = ['html']
  section = ['html']
  taxonomy = ['html']
  term = ['html']

[pagination]
  pagerSize = 10

ignoreLogs = ['warning-goldmark-raw-html']

[markup]
  [markup.highlight]
    noClasses = true
    style = 'monokai'
    lineNos = true

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      wrapStandAloneImageWithinParagraph = false
      [markup.goldmark.parser.attribute]
        block = true
        title = true
        anchor = true
      [markup.goldmark.renderHooks.image]
        useEmbedded = 'auto'

  [markup.tableOfContents]
    startLevel = 2
    endLevel = 5
    ordered = false

[privacy]
  [privacy.youTube]
    disable = false
    privacyEnhanced = false
