{{- if and hugo.IsProduction .Site.Params.goatcounterHost -}}
<div style="text-align: center; margin-top: 1rem; margin-bottom: 1rem; font-size: 12px; opacity: 0.7;">
  Views for this page: <span id="gc-page-views">...</span> &middot; <em>stats by <a href="https://www.goatcounter.com" rel="noopener noreferrer" target="_blank">GoatCounter</a></em>
</div>
<script>
  (function() {
    var path = encodeURIComponent(window.location.pathname);
    fetch('https://{{ .Site.Params.goatcounterHost }}/counter/' + path + '.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        document.getElementById('gc-page-views').textContent = data.count;
      })
      .catch(function() {
        document.getElementById('gc-page-views').textContent = '--';
      });
  })();
</script>
{{- end -}}
