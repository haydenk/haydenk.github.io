<div class="social-icons" {{ with .align}}align="{{.}}" {{- end }}>
    {{- range site.Params.socialIcons }}
    <a href="{{ trim .url " " | safeURL }}" target="_blank" rel="noopener noreferrer me"
        title="{{ (.title | default .name) | title }}">
        {{ partial "svg.html" . }}
    </a>
    {{- end }}
    {{- with site.Params.resumeURL }}
    <a href="{{ . | safeURL }}" target="_blank" rel="noopener noreferrer"
        title="Resume" style="display:inline-flex;align-items:center;gap:3px;">
        {{ partial "svg.html" (dict "name" "cv") }}<span style="font-size:0.75em;font-weight:600;line-height:1;">CV</span>
    </a>
    {{- end }}
</div>
